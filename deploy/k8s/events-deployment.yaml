apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-svc
  namespace: stagelog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: events-svc
  template:
    metadata:
      labels:
        app: events-svc
    spec:
      containers:
      - name: events-svc
        image: 430118823715.dkr.ecr.ap-northeast-2.amazonaws.com/stagelog-events:latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: stagelog-events-env
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: config.settings
        ports:
        - containerPort: 8000
