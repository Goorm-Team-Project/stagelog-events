apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stagelog-events-env
  namespace: stagelog
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore
    kind: ClusterSecretStore
  target:
    name: stagelog-events-env
    creationPolicy: Owner
  data:
  - secretKey: SECRET_KEY
    remoteRef:
      key: /stagelog/dev/shared/SECRET_KEY
  - secretKey: DEBUG
    remoteRef:
      key: /stagelog/dev/shared/DEBUG
  - secretKey: ALLOWED_HOSTS
    remoteRef:
      key: /stagelog/dev/shared/ALLOWED_HOSTS
  - secretKey: CORS_ALLOWED_ORIGINS
    remoteRef:
      key: /stagelog/dev/shared/CORS_ALLOWED_ORIGINS
  - secretKey: DB_MODE
    remoteRef:
      key: /stagelog/dev/shared/DB_MODE
  - secretKey: DB_HOST
    remoteRef:
      key: /stagelog/dev/shared/DB_HOST
  - secretKey: DB_NAME_EVENTS
    remoteRef:
      key: /stagelog/dev/events/DB_NAME_EVENTS
  - secretKey: DB_USER_EVENTS
    remoteRef:
      key: /stagelog/dev/events/DB_USER_EVENTS
  - secretKey: DB_PASSWORD_EVENTS
    remoteRef:
      key: /stagelog/dev/events/DB_PASSWORD_EVENTS
  - secretKey: DB_USE_SSL
    remoteRef:
      key: /stagelog/dev/shared/DB_USE_SSL
  - secretKey: DB_SSL_CA
    remoteRef:
      key: /stagelog/dev/shared/DB_SSL_CA
  - secretKey: USE_INTERNAL_SERVICE_API
    remoteRef:
      key: /stagelog/dev/events/USE_INTERNAL_SERVICE_API
  - secretKey: AUTH_INTERNAL_BASE_URL
    remoteRef:
      key: /stagelog/dev/shared/AUTH_INTERNAL_BASE_URL
  - secretKey: EVENTS_INTERNAL_BASE_URL
    remoteRef:
      key: /stagelog/dev/shared/EVENTS_INTERNAL_BASE_URL
  - secretKey: POSTS_INTERNAL_BASE_URL
    remoteRef:
      key: /stagelog/dev/shared/POSTS_INTERNAL_BASE_URL
  - secretKey: GATEWAY_USER_ID_HEADER
    remoteRef:
      key: /stagelog/dev/shared/GATEWAY_USER_ID_HEADER
  - secretKey: AWS_REGION
    remoteRef:
      key: /stagelog/dev/shared/AWS_REGION
  - secretKey: NOTIFICATION_EVENT_BUS_NAME
    remoteRef:
      key: /stagelog/dev/shared/NOTIFICATION_EVENT_BUS_NAME
  - secretKey: REDIS_HOST
    remoteRef:
      key: /stagelog/dev/shared/REDIS_HOST
  - secretKey: REDIS_PORT
    remoteRef:
      key: /stagelog/dev/shared/REDIS_PORT
  - secretKey: REDIS_DB
    remoteRef:
      key: /stagelog/dev/shared/REDIS_DB
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: /stagelog/dev/shared/REDIS_PASSWORD
  - secretKey: REDIS_SSL
    remoteRef:
      key: /stagelog/dev/shared/REDIS_SSL
  - secretKey: AUTO_BAN_ENABLED
    remoteRef:
      key: /stagelog/dev/shared/AUTO_BAN_ENABLED
  - secretKey: AUTO_BAN_LIMIT_WINDOW_SECONDS
    remoteRef:
      key: /stagelog/dev/shared/AUTO_BAN_LIMIT_WINDOW_SECONDS
  - secretKey: AUTO_BAN_MAX_REQUESTS
    remoteRef:
      key: /stagelog/dev/shared/AUTO_BAN_MAX_REQUESTS
  - secretKey: AUTO_BAN_BLOCK_TIME_SECONDS
    remoteRef:
      key: /stagelog/dev/shared/AUTO_BAN_BLOCK_TIME_SECONDS
